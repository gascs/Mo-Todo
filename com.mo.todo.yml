AutoName: Mo - Todo & Memo
Summary: A clean and elegant todo & memo app
Description: |-
    Mo is a clean and elegant Android todo & memo app built with Material 3,
    focused on local experience and data privacy.

    * Todo management with priority levels, label filtering, and reminders
    * Memo notes with star/favorite, color labels, and grid/list views
    * Smart reminders with AlarmManager + WorkManager triple-safeguard
    * Multiple Morandi color themes and Material You dynamic color
    * Chinese / English bilingual support
    * JSON local export/import and WebDAV cloud backup

