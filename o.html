<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mo - 待办 & 备忘录</title>
    <style>
        :root {
            /* Material You 风格动态色彩 - 默认绿色系 */
            --md-primary: #4a6b4f;
            --md-on-primary: #ffffff;
            --md-primary-container: #ccefd2;
            --md-on-primary-container: #0a1f10;
            --md-secondary: #5b6b5d;
            --md-on-secondary: #ffffff;
            --md-secondary-container: #dff1e1;
            --md-on-secondary-container: #18271b;
            --md-tertiary: #3e665f;
            --md-on-tertiary: #ffffff;
            --md-tertiary-container: #c0ece4;
            --md-on-tertiary-container: #00201c;
            --md-surface: #fafaf7;
            --md-on-surface: #1a1c19;
            --md-surface-variant: #dee4db;
            --md-on-surface-variant: #43483f;
            --md-outline: #73786f;
            --md-outline-variant: #c2c8bd;
            --md-inverse-surface: #2f312d;
            --md-inverse-on-surface: #f0f1eb;
            --md-surface-container-low: #f4f4f1;
            --md-surface-container: #eeefeb;
            --md-surface-container-high: #e8e9e5;
            --md-surface-container-highest: #e2e3df;
            --md-error: #ba1a1a;
            --md-on-error: #ffffff;
            --md-error-container: #ffdad6;
            --md-shadow: rgba(0, 0, 0, 0.08);
            --md-shadow-strong: rgba(0, 0, 0, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 28px;
            --elevation-1: 0 1px 3px var(--md-shadow), 0 1px 2px var(--md-shadow);
            --elevation-2: 0 3px 6px var(--md-shadow), 0 2px 4px var(--md-shadow-strong);
            --elevation-3: 0 6px 14px var(--md-shadow-strong), 0 3px 6px var(--md-shadow);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: #e8e5df;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 手机框架 */
        .phone-frame {
            width: 412px;
            max-width: 100%;
            height: 850px;
            max-height: 92vh;
            background: var(--md-surface);
            border-radius: 32px;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.25),
                0 0 0 3px #1a1c19,
                0 0 0 6px #2f312d,
                0 0 0 8px #1a1c19;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 状态栏 */
        .status-bar {
            height: 40px;
            background: var(--md-surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 12px;
            font-weight: 600;
            color: var(--md-on-surface);
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .status-bar .time {
            font-weight: 700;
        }
        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 11px;
        }
        .status-icons span {
            font-size: 13px;
        }
        .notch-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1a1c19;
            margin-left: 2px;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .main-content::-webkit-scrollbar {
            width: 0;
        }

        /* 页面容器 */
        .page {
            display: none;
            flex-direction: column;
            min-height: 100%;
            animation: fadeSlideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .page.active {
            display: flex;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes scaleCheck {
            0% {
                transform: scale(1);
            }
            40% {
                transform: scale(1.35);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes strikeThrough {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        /* 顶部应用栏 */
        .top-app-bar {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 12px;
            flex-shrink: 0;
            min-height: 56px;
            background: var(--md-surface);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid transparent;
            transition: border-color var(--transition-fast);
        }
        .top-app-bar.scrolled {
            border-bottom-color: var(--md-outline-variant);
        }
        .top-app-bar .title {
            font-size: 22px;
            font-weight: 700;
            color: var(--md-on-surface);
            letter-spacing: -0.3px;
            flex: 1;
        }
        .top-app-bar .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--md-on-surface-variant);
            transition: all var(--transition-fast);
            position: relative;
        }
        .top-app-bar .icon-btn:hover {
            background: var(--md-surface-container-high);
        }
        .top-app-bar .icon-btn:active {
            background: var(--md-surface-container-highest);
            transform: scale(0.93);
        }
        .badge-dot {
            position: absolute;
            top: 6px;
            right: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--md-error);
            border: 2px solid var(--md-surface);
        }

        /* 分类标签栏 */
        .chip-row {
            display: flex;
            gap: 8px;
            padding: 10px 16px 6px;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .chip-row::-webkit-scrollbar {
            display: none;
        }
        .chip {
            padding: 8px 18px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all var(--transition-fast);
            border: 1.5px solid var(--md-outline-variant);
            background: var(--md-surface);
            color: var(--md-on-surface-variant);
            letter-spacing: 0.2px;
            flex-shrink: 0;
        }
        .chip:hover {
            background: var(--md-surface-container-high);
        }
        .chip.active {
            background: var(--md-secondary-container);
            color: var(--md-on-secondary-container);
            border-color: transparent;
            font-weight: 700;
        }
        .chip:active {
            transform: scale(0.95);
        }

        /* 列表区域 */
        .list-section {
            padding: 4px 12px 80px;
            flex: 1;
        }
        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--md-on-surface-variant);
            padding: 10px 8px 6px;
            opacity: 0.7;
        }
        .todo-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
            gap: 12px;
            position: relative;
            background: var(--md-surface);
            margin-bottom: 2px;
        }
        .todo-item:hover {
            background: var(--md-surface-container-low);
        }
        .todo-item:active {
            background: var(--md-surface-container-high);
            transform: scale(0.985);
        }
        .todo-item.completed .todo-text {
            color: var(--md-on-surface-variant);
            opacity: 0.55;
            position: relative;
        }
        .todo-item.completed .todo-text::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 0;
            height: 1.5px;
            background: var(--md-on-surface-variant);
            animation: strikeThrough 0.4s ease-out forwards;
        }
        .todo-item.completed .todo-meta {
            opacity: 0.4;
        }
        .checkbox-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--md-outline);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            font-size: 13px;
            color: transparent;
        }
        .todo-item.completed .checkbox-circle {
            background: var(--md-primary);
            border-color: var(--md-primary);
            color: var(--md-on-primary);
            animation: scaleCheck 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .todo-info {
            flex: 1;
            min-width: 0;
        }
        .todo-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--md-on-surface);
            letter-spacing: 0.1px;
            transition: color var(--transition-fast);
            word-break: break-word;
        }
        .todo-meta {
            font-size: 12px;
            color: var(--md-on-surface-variant);
            margin-top: 2px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tag-dot.work {
            background: #5b8def;
        }
        .tag-dot.personal {
            background: #f0a050;
        }
        .tag-dot.shopping {
            background: #e87090;
        }
        .tag-dot.project {
            background: #f0a050;
        }
        .tag-dot.reading {
            background: #5b8def;
        }
        .drag-handle {
            color: var(--md-outline);
            cursor: grab;
            font-size: 18px;
            padding: 4px;
            opacity: 0.4;
            transition: opacity var(--transition-fast);
        }
        .todo-item:hover .drag-handle {
            opacity: 0.8;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            text-align: center;
            color: var(--md-on-surface-variant);
            opacity: 0.6;
        }
        .empty-state .emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .empty-state .text {
            font-size: 16px;
            font-weight: 500;
        }

        /* FAB */
        .fab {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
            border: none;
            cursor: pointer;
            font-size: 26px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--elevation-3);
            transition: all var(--transition-smooth);
            z-index: 20;
            letter-spacing: 0;
            line-height: 1;
        }
        .fab:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }
        .fab:active {
            transform: scale(0.9);
            box-shadow: var(--elevation-1);
            transition: all 0.1s ease;
        }

        /* 底部导航栏 */
        .bottom-nav {
            display: flex;
            background: var(--md-surface-container-high);
            border-top: 1px solid var(--md-outline-variant);
            padding: 6px 8px 12px;
            flex-shrink: 0;
            z-index: 30;
            gap: 4px;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 4px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
            background: transparent;
            font-family: var(--font-sans);
            font-size: 11px;
            font-weight: 600;
            color: var(--md-on-surface-variant);
            letter-spacing: 0.3px;
            gap: 2px;
            position: relative;
        }
        .nav-item .nav-icon {
            font-size: 22px;
            transition: all var(--transition-fast);
        }
        .nav-item.active {
            color: var(--md-primary);
            font-weight: 700;
        }
        .nav-item.active .nav-icon {
            color: var(--md-primary);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 3px;
            border-radius: 0 0 3px 3px;
            background: var(--md-primary);
        }
        .nav-item:hover {
            background: var(--md-surface-container-highest);
        }
        .nav-item:active {
            transform: scale(0.9);
        }
        .nav-badge {
            position: absolute;
            top: 2px;
            right: 14px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--md-error);
            color: white;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* 备忘录网格 */
        .memo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px 12px 80px;
        }
        .memo-card {
            background: var(--md-surface-container-low);
            border-radius: var(--radius-lg);
            padding: 14px;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
            min-height: 130px;
        }
        .memo-card:hover {
            border-color: var(--md-outline-variant);
            box-shadow: var(--elevation-2);
            transform: translateY(-1px);
        }
        .memo-card:active {
            transform: scale(0.97);
            transition: all 0.1s ease;
        }
        .memo-card .memo-thumb {
            width: 100%;
            height: 70px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--md-primary-container), var(--md-tertiary-container));
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--md-on-primary-container);
            opacity: 0.7;
        }
        .memo-card .memo-title {
            font-weight: 700;
            font-size: 14px;
            color: var(--md-on-surface);
            margin-bottom: 2px;
            letter-spacing: 0.1px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .memo-card .memo-preview {
            font-size: 11px;
            color: var(--md-on-surface-variant);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        .memo-card .memo-meta {
            font-size: 10px;
            color: var(--md-outline);
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .memo-card .star-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 16px;
            color: #f0c040;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .memo-card.starred .star-icon {
            opacity: 1;
        }
        .view-toggle {
            display: flex;
            gap: 2px;
            background: var(--md-surface-container-high);
            border-radius: var(--radius-full);
            padding: 3px;
        }
        .view-toggle button {
            width: 34px;
            height: 30px;
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            font-size: 16px;
            background: transparent;
            color: var(--md-on-surface-variant);
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .view-toggle button.active {
            background: var(--md-surface);
            color: var(--md-primary);
            box-shadow: var(--elevation-1);
            font-weight: 700;
        }

        /* 设置页 */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 16px;
            background: var(--md-surface);
            border-bottom: 1px solid var(--md-outline-variant);
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7ca88b, #5b8c6f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            flex-shrink: 0;
            font-weight: 700;
        }
        .profile-info .name {
            font-weight: 700;
            font-size: 18px;
            color: var(--md-on-surface);
        }
        .profile-info .bio {
            font-size: 13px;
            color: var(--md-on-surface-variant);
            margin-top: 2px;
        }
        .settings-list {
            padding: 8px 12px 80px;
        }
        .setting-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
            gap: 14px;
            background: var(--md-surface);
            margin-bottom: 2px;
        }
        .setting-item:hover {
            background: var(--md-surface-container-low);
        }
        .setting-item:active {
            background: var(--md-surface-container-high);
            transform: scale(0.98);
        }
        .setting-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .setting-icon.s1 {
            background: #e8f5e9;
            color: #388e3c;
        }
        .setting-icon.s2 {
            background: #fff3e0;
            color: #f57c00;
        }
        .setting-icon.s3 {
            background: #e3f2fd;
            color: #1976d2;
        }
        .setting-icon.s4 {
            background: #fce4ec;
            color: #c62828;
        }
        .setting-icon.s5 {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        .setting-label {
            flex: 1;
            font-weight: 500;
            font-size: 14px;
            color: var(--md-on-surface);
        }
        .setting-value {
            font-size: 13px;
            color: var(--md-on-surface-variant);
            margin-right: 4px;
        }
        .setting-arrow {
            color: var(--md-outline);
            font-size: 16px;
        }

        /* 弹窗遮罩 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 50;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        /* 底部弹出面板 */
        .bottom-sheet {
            background: var(--md-surface-container-high);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 8px 16px 24px;
            animation: slideUp 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.2);
        }
        .sheet-handle {
            width: 40px;
            height: 5px;
            border-radius: 5px;
            background: var(--md-outline-variant);
            margin: 0 auto 12px;
        }
        .sheet-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--md-on-surface);
            margin-bottom: 16px;
            letter-spacing: -0.2px;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--md-outline-variant);
            font-size: 15px;
            font-family: var(--font-sans);
            background: var(--md-surface);
            color: var(--md-on-surface);
            transition: all var(--transition-fast);
            outline: none;
            resize: vertical;
        }
        .input-field:focus {
            border-color: var(--md-primary);
            box-shadow: 0 0 0 3px rgba(74, 107, 79, 0.12);
        }
        .input-field.large {
            font-size: 19px;
            font-weight: 500;
            padding: 16px;
            border-radius: var(--radius-lg);
        }
        .input-field.multiline {
            min-height: 90px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--md-on-surface-variant);
            margin-bottom: 6px;
            display: block;
        }
        .chip-row.form-chips {
            padding: 0;
            flex-wrap: wrap;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn {
            padding: 14px 24px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            border: none;
            font-family: var(--font-sans);
            letter-spacing: 0.3px;
            transition: all var(--transition-fast);
            flex: 1;
            text-align: center;
        }
        .btn-primary {
            background: var(--md-primary);
            color: var(--md-on-primary);
            box-shadow: var(--elevation-1);
        }
        .btn-primary:hover {
            box-shadow: var(--elevation-2);
        }
        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: none;
        }
        .btn-outline {
            background: transparent;
            color: var(--md-primary);
            border: 1.5px solid var(--md-outline-variant);
        }
        .btn-outline:hover {
            background: var(--md-surface-container-low);
        }
        .btn-outline:active {
            transform: scale(0.95);
            background: var(--md-surface-container-high);
        }
        .priority-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .priority-dot.high {
            background: #e53935;
        }
        .priority-dot.medium {
            background: #f9a825;
        }
        .priority-dot.low {
            background: #43a047;
        }
        .color-dots {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .color-dot:hover {
            transform: scale(1.15);
        }
        .color-dot.selected {
            border-color: var(--md-on-surface);
            box-shadow: 0 0 0 4px var(--md-surface-container-high), 0 0 0 6px var(--md-primary);
        }

        /* 响应式 */
        @media (max-width: 450px) {
            .phone-frame {
                width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
            body {
                padding: 0;
            }
            .bottom-sheet {
                max-width: 100%;
                border-radius: 20px 20px 0 0;
            }
        }
    </style>
</head>
<body>

    <div class="phone-frame" id="phoneFrame">
        <!-- 状态栏 -->

            <span class="time">9:41</span>
            <div class="status-icons">

                <span>🔋</span>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content" id="mainContent">

            <!-- ========== 待办列表页 ========== -->
            <div class="page active" id="page-todo">
                <div class="top-app-bar" id="todoBar">
                    <span class="title">Mo · 待办</span>
                    <button class="icon-btn" title="搜索" onclick="alert('🔍 全局搜索')">🔍</button>
                    <button class="icon-btn" title="更多" onclick="alert('⋮ 筛选 & 排序选项')">⋮</button>
                </div>
                <div class="chip-row">
                    <span class="chip active" data-filter="all" onclick="filterTodos('all', this)">全部</span>
                    <span class="chip" data-filter="work" onclick="filterTodos('work', this)">💼 工作</span>
                    <span class="chip" data-filter="personal" onclick="filterTodos('personal', this)">👤 个人</span>

                </div>
                <div class="list-section" id="todoList">
                    <div class="section-label">⏳ 待完成</div>
                    <!-- 待办项由JS动态渲染 -->
                    <div class="section-label" style="margin-top:8px;">✅ 已完成 (<span id="doneCount">2</span>)</div>
                    <div id="doneList"></div>
                    <div class="empty-state" id="emptyTodo" style="display:none;">
                        <span class="emoji">🎉</span>

                <button class="fab" onclick="openAddTodo()" title="新建待办">+</button>

            <!-- ========== 备忘录页 ========== -->
            <div class="page" id="page-memo">
                <div class="top-app-bar" id="memoBar">
                    <span class="title">Mo · 备忘</span>
                    <button class="icon-btn" title="搜索" onclick="alert('🔍 搜索备忘录')">🔍</button>
                    <div class="view-toggle">
                        <button class="active" data-view="grid" onclick="switchMemoView('grid', this)" title="网格视图">⊞</button>
                        <button data-view="list" onclick="switchMemoView('list', this)" title="列表视图">☰</button>
                    </div>
                    <button class="icon-btn" title="更多" onclick="alert('⋮ 标签筛选 & 排序')">⋮</button>
                </div>
                <div class="chip-row">
                    <span class="chip active" data-memo-filter="all" onclick="filterMemos('all', this)">全部</span>
                    <span class="chip" data-memo-filter="note" onclick="filterMemos('note', this)">📝 便签</span>
                    <span class="chip" data-memo-filter="reading" onclick="filterMemos('reading', this)">📖 阅读笔记</span>
                    <span class="chip" data-memo-filter="project" onclick="filterMemos('project', this)">📋 项目</span>
                </div>

                    <!-- 备忘录卡片由JS动态渲染 -->
                </div>

                    <span class="emoji">📝</span>

                </div>

            <!-- ========== 我的页面 ========== -->

                    <span class="title">Mo · 我的</span>

                        <div class="setting-icon s2">🔔</div>

                        <span class="setting-value">提前10分钟</span>
                        <span class="setting-arrow">›</span>
                    </div>
                    <div class="setting-item" onclick="toggleTheme()">
                        <div class="setting-icon s3">🎨</div>
                        <span class="setting-label">主题</span>
                        <span class="setting-value" id="themeLabel">浅色</span>

                    </div>
                    <div class="setting-item" onclick="alert('💾 数据备份与导出')">
                        <div class="setting-icon s4">💾</div>
                        <span class="setting-label">数据备份与导出</span>
                        <span class="setting-value">未备份</span>
                        <span class="setting-arrow">›</span>
                    </div>
                    <div class="setting-item" onclick="alert('ℹ️ 关于 Mo v1.0')">
                        <div class="setting-icon s5">ℹ️</div>
                        <span class="setting-label">关于 Mo</span>

        <!-- 底部导航栏 -->
        <div class="bottom-nav">

            <button class="nav-item" data-page="page-memo" onclick="switchPage('page-memo', this)">
                <span class="nav-icon">📄</span>

            </button>
            <button class="nav-item" data-page="page-profile" onclick="switchPage('page-profile', this)">
                <span class="nav-icon">👤</span>
                <span>我的</span>
            </button>
        </div>
    </div>

    <!-- ========== 新增待办弹窗 ========== -->
    <div class="modal-overlay" id="addTodoModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-title">📋 新建待办</div>
            <div class="form-group">
                <label class="form-label">标题</label>
                <input type="text" class="input-field large" id="newTodoTitle" placeholder="输入待办事项标题...">
            </div>
            <div class="form-group">
                <label class="form-label">详情备注</label>
                <textarea class="input-field multiline" id="newTodoDesc" placeholder="添加详细描述（可选）"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">提醒时间</label>
                <input type="datetime-local" class="input-field" id="newTodoReminder">
            </div>
            <div class="form-group">
                <label class="form-label">标签</label>
                <div class="chip-row form-chips" id="todoTagChips">
                    <span class="chip active" data-tag="work" onclick="selectTodoTag('work', this)">💼 工作</span>
                    <span class="chip" data-tag="personal" onclick="selectTodoTag('personal', this)">👤 个人</span>
                    <span class="chip" data-tag="shopping" onclick="selectTodoTag('shopping', this)">🛒 购物</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">优先级</label>
                <div class="chip-row form-chips" id="priorityChips">
                    <span class="chip" data-priority="high" onclick="selectPriority('high', this)"><span class="priority-dot high"></span>高</span>
                    <span class="chip active" data-priority="medium" onclick="selectPriority('medium', this)"><span class="priority-dot medium"></span>中</span>
                    <span class="chip" data-priority="low" onclick="selectPriority('low', this)"><span class="priority-dot low"></span>低</span>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-outline" onclick="closeAddTodo()">取消</button>
                <button class="btn btn-primary" onclick="saveTodo()">✓ 保存</button>
            </div>
        </div>

    <!-- ========== 新增备忘录弹窗 ========== -->
    <div class="modal-overlay" id="addMemoModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-title">📝 新建备忘录</div>
            <div class="form-group">
                <label class="form-label">标题</label>
                <input type="text" class="input-field large" id="newMemoTitle" placeholder="输入备忘录标题...">
            </div>
            <div class="form-group">
                <label class="form-label">内容</label>
                <textarea class="input-field multiline" id="newMemoContent" placeholder="开始记录...支持加粗、列表等"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">颜色标签</label>
                <div class="color-dots">
                    <span class="color-dot selected" style="background:#a5d6a7;" data-color="#a5d6a7" onclick="selectMemoColor(this)"></span>
                    <span class="color-dot" style="background:#ffcc80;" data-color="#ffcc80" onclick="selectMemoColor(this)"></span>
                    <span class="color-dot" style="background:#90caf9;" data-color="#90caf9" onclick="selectMemoColor(this)"></span>
                    <span class="color-dot" style="background:#f48fb1;" data-color="#f48fb1" onclick="selectMemoColor(this)"></span>
                    <span class="color-dot" style="background:#ce93d8;" data-color="#ce93d8" onclick="selectMemoColor(this)"></span>
                    <span class="color-dot" style="background:#fff9c4;" data-color="#fff9c4" onclick="selectMemoColor(this)"></span>
                    <span class="color-dot" style="background:#d7ccc8;" data-color="#d7ccc8" onclick="selectMemoColor(this)"></span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">分类</label>
                <div class="chip-row form-chips" id="memoTagChips">
                    <span class="chip active" data-memo-tag="note" onclick="selectMemoTag('note', this)">📝 便签</span>
                    <span class="chip" data-memo-tag="reading" onclick="selectMemoTag('reading', this)">📖 阅读笔记</span>
                    <span class="chip" data-memo-tag="project" onclick="selectMemoTag('project', this)">📋 项目</span>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-outline" onclick="closeAddMemo()">取消</button>
                <button class="btn btn-primary" onclick="saveMemo()">✓ 保存</button>
            </div>
        </div>
    </div>

    <script>
        // ============ 数据存储 ============
        let todos = [
            { id: 1, text: '完成项目提案', tag: 'work', priority: 'high', reminder: '明天 10:00',
                completed: false, desc: '' },
            { id: 2, text: '买牛奶和面包', tag: 'shopping', priority: 'medium', reminder: '无日期',
            completed: false, desc: '' },
            { id: 3, text: '回复客户邮件', tag: 'work', priority: 'high', reminder: '昨天', completed: true,
            desc: '' },
            { id: 4, text: '跑步30分钟', tag: 'personal', priority: 'low', reminder: '每天', completed: true,
            desc: '' },
        ];
        let todoIdCounter = 5;

        let memos = [
            { id: 1, title: '旅行计划', preview: '整理了去云南的行程安排，包括大理和丽江...', tag: 'note', color: '#a5d6a7',
                starred: true, date: '6月1日' },
            { id: 2, title: '会议纪要', preview: '讨论了Q2项目目标和关键节点，需要跟进开发进度...', tag: 'project',
                color: '#ffcc80', starred: false, date: '昨天' },
            { id: 3, title: '读书笔记《深度工作》', preview: '深度工作的核心是长时间无干扰地专注于高认知需求任务...', tag: 'reading',
                color: '#90caf9', starred: true, date: '5月28日' },
            { id: 4, title: '购物清单', preview: '周末去超市需要购买日用品和食材...', tag: 'note', color: '#f48fb1',
                starred: false, date: '5月25日' },
        ];
        let memoIdCounter = 5;

        let currentFilter = 'all';
        let currentMemoFilter = 'all';
        let currentMemoView = 'grid';
        let selectedTodoTag = 'work';
        let selectedPriority = 'medium';
        let selectedMemoColor = '#a5d6a7';
        let selectedMemoTag = 'note';
        let isDarkTheme = false;

        // ============ 页面切换 ============
        function switchPage(pageId, navBtn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const page = document.getElementById(pageId);
            if (page) page.classList.add('active');
            if (navBtn) navBtn.classList.add('active');
            // 滚动到顶部
            document.getElementById('mainContent').scrollTop = 0;
        }

        // ============ 待办渲染 ============
        function renderTodos() {
            const todoList = document.getElementById('todoList');
            const doneList = document.getElementById('doneList');
            const emptyTodo = document.getElementById('emptyTodo');
            const doneCountEl = document.getElementById('doneCount');
            const todoBadge = document.getElementById('todoBadge');

            const activeTodos = todos.filter(t => !t.completed && (currentFilter === 'all' || t.tag ===
                currentFilter));
            const doneTodos = todos.filter(t => t.completed && (currentFilter === 'all' || t.tag === currentFilter));

            // 清空
            const sectionLabels = todoList.querySelectorAll('.section-label');
            // 保留section labels，清除动态内容
            const existingItems = todoList.querySelectorAll('.todo-item');
            existingItems.forEach(el => el.remove());
            const existingDone = doneList.querySelectorAll('.todo-item');
            existingDone.forEach(el => el.remove());

            // 插入活跃待办
            const firstLabel = todoList.querySelector('.section-label');
            activeTodos.forEach(todo => {
                const item = createTodoElement(todo);
                if (firstLabel && firstLabel.nextSibling) {
                    todoList.insertBefore(item, firstLabel.nextSibling);
                } else if (firstLabel) {
                    firstLabel.after(item);
                } else {
                    todoList.appendChild(item);
                }
            });

            // 插入已完成
            doneTodos.forEach(todo => {
                doneList.appendChild(createTodoElement(todo));
            });

            doneCountEl.textContent = doneTodos.length;
            todoBadge.textContent = activeTodos.length;
            if (activeTodos.length === 0) todoBadge.style.display = 'none';
            else todoBadge.style.display = 'flex';

            // 空状态
            if (activeTodos.length === 0 && doneTodos.length === 0) {
                emptyTodo.style.display = 'flex';
            } else {
                emptyTodo.style.display = 'none';
            }

            // 更新section label显示
            const labels = todoList.querySelectorAll('.section-label');
            labels.forEach(l => {
                if (l.textContent.includes('待完成') && activeTodos.length === 0) {
                    l.style.display = 'none';
                } else if (l.textContent.includes('待完成')) {
                    l.style.display = '';
                }
            });
            const doneLabel = todoList.querySelector('.section-label:last-of-type');
            if (doneLabel && doneTodos.length === 0 && doneLabel.textContent.includes('已完成')) {
                doneLabel.style.display = 'none';
            } else if (doneLabel && doneLabel.textContent.includes('已完成')) {
                doneLabel.style.display = '';
            }
        }

        function createTodoElement(todo) {
            const div = document.createElement('div');
            div.className = 'todo-item' + (todo.completed ? ' completed' : '');
            div.setAttribute('data-id', todo.id);
            div.setAttribute('data-tag', todo.tag);
            const tagDotClass = todo.tag;
            const priorityEmoji = todo.priority === 'high' ? '🔴' : todo.priority === 'medium' ? '🟡' : '🟢';
            div.innerHTML = `
            <span class="checkbox-circle" onclick="event.stopPropagation(); toggleTodo(${todo.id})">✓</span>
            <div class="todo-info">
              <span class="todo-text">${todo.text}</span>
              <span class="todo-meta">
                <span>${todo.reminder}</span>
                <span class="tag-dot ${tagDotClass}"></span>
                <span style="font-size:10px;">${priorityEmoji}</span>
              </span>
            </div>
            <span class="drag-handle" title="长按拖拽排序">⋮⋮</span>
          `;
            div.addEventListener('click', function(e) {
                if (!e.target.classList.contains('checkbox-circle') && !e.target.closest('.drag-handle')) {
                    toggleTodo(todo.id);
                }
            });
            // 拖拽手柄
            const handle = div.querySelector('.drag-handle');
            handle.addEventListener('mousedown', function(e) {
                e.stopPropagation();
                div.style.opacity = '0.5';
            });
            handle.addEventListener('mouseup', function() {
                div.style.opacity = '1';
            });
            handle.addEventListener('mouseleave', function() {
                div.style.opacity = '1';
            });
            return div;
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                renderTodos();
            }
        }

        function filterTodos(filter, chipEl) {
            currentFilter = filter;
            document.querySelectorAll('#page-todo .chip-row .chip').forEach(c => c.classList.remove('active'));
            if (chipEl) chipEl.classList.add('active');
            renderTodos();
        }

        // ============ 备忘录渲染 ============
        function renderMemos() {
            const memoGrid = document.getElementById('memoGrid');
            const emptyMemo = document.getElementById('emptyMemo');
            memoGrid.innerHTML = '';
            const filtered = memos.filter(m => currentMemoFilter === 'all' || m.tag === currentMemoFilter);

            if (filtered.length === 0) {
                emptyMemo.style.display = 'flex';
                memoGrid.style.display = 'none';
            } else {
                emptyMemo.style.display = 'none';
                memoGrid.style.display = currentMemoView === 'grid' ? 'grid' : 'flex';
                if (currentMemoView === 'list') {
                    memoGrid.style.flexDirection = 'column';
                    memoGrid.style.gap = '6px';
                } else {
                    memoGrid.style.flexDirection = '';
                    memoGrid.style.gap = '10px';
                }
                filtered.forEach(memo => {
                    memoGrid.appendChild(createMemoElement(memo));
                });
            }
        }

        function createMemoElement(memo) {
            const div = document.createElement('div');
            div.className = 'memo-card' + (memo.starred ? ' starred' : '');
            div.setAttribute('data-tag', memo.tag);
            if (currentMemoView === 'list') {
                div.style.display = 'flex';
                div.style.gap = '12px';
                div.style.alignItems = 'center';
                div.style.minHeight = 'auto';
                div.style.padding = '10px 14px';
                div.innerHTML = `
              <div style="width:44px;height:44px;border-radius:10px;background:${memo.color};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;">📝</div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:700;font-size:14px;">${memo.title}</div>
                <div style="font-size:11px;color:var(--md-on-surface-variant);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${memo.preview}</div>
              </div>
              <span class="star-icon" style="position:static;opacity:${memo.starred?1:0};">⭐</span>
              <span style="font-size:10px;color:var(--md-outline);">${memo.date}</span>
            `;
            } else {
                div.innerHTML = `
              <span class="star-icon">⭐</span>
              <div class="memo-thumb" style="background:${memo.color};opacity:0.6;">📝</div>
              <div class="memo-title">${memo.title}</div>
              <div class="memo-preview">${memo.preview}</div>
              <div class="memo-meta">
                <span>${memo.date}</span>
                <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${memo.color}33;">${memo.tag}</span>
              </div>
            `;
            }
            div.addEventListener('click', function() {
                memo.starred = !memo.starred;
                renderMemos();
            });
            return div;
        }

        function switchMemoView(view, btn) {
            currentMemoView = view;
            document.querySelectorAll('#page-memo .view-toggle button').forEach(b => b.classList.remove(
            'active'));
            if (btn) btn.classList.add('active');
            renderMemos();
        }

        function filterMemos(filter, chipEl) {
            currentMemoFilter = filter;
            document.querySelectorAll('#page-memo .chip-row .chip').forEach(c => c.classList.remove('active'));
            if (chipEl) chipEl.classList.add('active');
            renderMemos();
        }

        // ============ 新增待办弹窗 ============
        function openAddTodo() {
            document.getElementById('addTodoModal').classList.add('show');
            document.getElementById('newTodoTitle').focus();
            // 重置选择
            selectedTodoTag = 'work';
            selectedPriority = 'medium';
            document.querySelectorAll('#todoTagChips .chip').forEach(c => c.classList.remove('active'));
            document.querySelector('#todoTagChips .chip[data-tag="work"]')?.classList.add('active');
            document.querySelectorAll('#priorityChips .chip').forEach(c => c.classList.remove('active'));
            document.querySelector('#priorityChips .chip[data-priority="medium"]')?.classList.add('active');
        }

        function closeAddTodo() {
            document.getElementById('addTodoModal').classList.remove('show');
            document.getElementById('newTodoTitle').value = '';
            document.getElementById('newTodoDesc').value = '';
            document.getElementById('newTodoReminder').value = '';
        }

        function selectTodoTag(tag, el) {
            selectedTodoTag = tag;
            document.querySelectorAll('#todoTagChips .chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function selectPriority(priority, el) {
            selectedPriority = priority;
            document.querySelectorAll('#priorityChips .chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function saveTodo() {
            const title = document.getElementById('newTodoTitle').value.trim();
            if (!title) {
                alert('请输入待办标题');
                return;
            }
            const reminderVal = document.getElementById('newTodoReminder').value;
            const reminder = reminderVal ? new Date(reminderVal).toLocaleString('zh-CN', { month: 'numeric',
                day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '无日期';
            todos.unshift({
                id: todoIdCounter++,
                text: title,
                tag: selectedTodoTag,
                priority: selectedPriority,
                reminder: reminder,
                completed: false,
                desc: document.getElementById('newTodoDesc').value.trim(),
            });
            closeAddTodo();
            renderTodos();
            // 切换到待办页
            switchPage('page-todo', document.querySelector('.nav-item[data-page="page-todo"]'));
        }

        // 点击遮罩关闭
        document.getElementById('addTodoModal').addEventListener('click', function(e) {
            if (e.target === this) closeAddTodo();
        });

        // ============ 新增备忘录弹窗 ============
        function openAddMemo() {
            document.getElementById('addMemoModal').classList.add('show');
            document.getElementById('newMemoTitle').focus();
            selectedMemoColor = '#a5d6a7';
            selectedMemoTag = 'note';
            document.querySelectorAll('#addMemoModal .color-dot').forEach(d => d.classList.remove('selected'));
            document.querySelector('#addMemoModal .color-dot[data-color="#a5d6a7"]')?.classList.add('selected');
            document.querySelectorAll('#memoTagChips .chip').forEach(c => c.classList.remove('active'));
            document.querySelector('#memoTagChips .chip[data-memo-tag="note"]')?.classList.add('active');
        }

        function closeAddMemo() {
            document.getElementById('addMemoModal').classList.remove('show');
            document.getElementById('newMemoTitle').value = '';
            document.getElementById('newMemoContent').value = '';
        }

        function selectMemoColor(el) {
            document.querySelectorAll('#addMemoModal .color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            selectedMemoColor = el.getAttribute('data-color');
        }

        function selectMemoTag(tag, el) {
            selectedMemoTag = tag;
            document.querySelectorAll('#memoTagChips .chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function saveMemo() {
            const title = document.getElementById('newMemoTitle').value.trim();
            if (!title) {
                alert('请输入备忘录标题');
                return;
            }
            const content = document.getElementById('newMemoContent').value.trim();
            const preview = content.length > 50 ? content.substring(0, 50) + '...' : content || '空内容';
            memos.unshift({
                id: memoIdCounter++,
                title: title,
                preview: preview,
                tag: selectedMemoTag,
                color: selectedMemoColor,
                starred: false,
                date: '刚刚',
            });
            closeAddMemo();
            renderMemos();
            switchPage('page-memo', document.querySelector('.nav-item[data-page="page-memo"]'));
        }

        document.getElementById('addMemoModal').addEventListener('click', function(e) {
            if (e.target === this) closeAddMemo();
        });

        // ============ 主题切换 ============
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            const root = document.documentElement;
            const themeLabel = document.getElementById('themeLabel');
            if (isDarkTheme) {
                root.style.setProperty('--md-surface', '#1a1c19');
                root.style.setProperty('--md-on-surface', '#e2e3df');
                root.style.setProperty('--md-surface-variant', '#43483f');
                root.style.setProperty('--md-on-surface-variant', '#c2c8bd');
                root.style.setProperty('--md-outline', '#8c9288');
                root.style.setProperty('--md-outline-variant', '#43483f');
                root.style.setProperty('--md-surface-container-low', '#222420');
                root.style.setProperty('--md-surface-container', '#262825');
                root.style.setProperty('--md-surface-container-high', '#2a2d29');
                root.style.setProperty('--md-surface-container-highest', '#2f312d');
                root.style.setProperty('--md-primary-container', '#3a5a40');
                root.style.setProperty('--md-on-primary-container', '#ccefd2');
                root.style.setProperty('--md-secondary-container', '#435346');
                root.style.setProperty('--md-on-secondary-container', '#dff1e1');
                root.style.setProperty('--md-tertiary-container', '#2a4f48');
                root.style.setProperty('--md-on-tertiary-container', '#c0ece4');
                root.style.setProperty('--md-shadow', 'rgba(0,0,0,0.3)');
                root.style.setProperty('--md-shadow-strong', 'rgba(0,0,0,0.5)');
                themeLabel.textContent = '深色';
            } else {
                root.style.setProperty('--md-surface', '#fafaf7');
                root.style.setProperty('--md-on-surface', '#1a1c19');
                root.style.setProperty('--md-surface-variant', '#dee4db');
                root.style.setProperty('--md-on-surface-variant', '#43483f');
                root.style.setProperty('--md-outline', '#73786f');
                root.style.setProperty('--md-outline-variant', '#c2c8bd');
                root.style.setProperty('--md-surface-container-low', '#f4f4f1');
                root.style.setProperty('--md-surface-container', '#eeefeb');
                root.style.setProperty('--md-surface-container-high', '#e8e9e5');
                root.style.setProperty('--md-surface-container-highest', '#e2e3df');
                root.style.setProperty('--md-primary-container', '#ccefd2');
                root.style.setProperty('--md-on-primary-container', '#0a1f10');
                root.style.setProperty('--md-secondary-container', '#dff1e1');
                root.style.setProperty('--md-on-secondary-container', '#18271b');
                root.style.setProperty('--md-tertiary-container', '#c0ece4');
                root.style.setProperty('--md-on-tertiary-container', '#00201c');
                root.style.setProperty('--md-shadow', 'rgba(0,0,0,0.08)');
                root.style.setProperty('--md-shadow-strong', 'rgba(0,0,0,0.15)');
                themeLabel.textContent = '浅色';
            }
        }

        // ============ 滚动时顶栏效果 ============
        document.getElementById('mainContent').addEventListener('scroll', function() {
            const todoBar = document.getElementById('todoBar');
            const memoBar = document.getElementById('memoBar');
            if (this.scrollTop > 5) {
                if (todoBar) todoBar.classList.add('scrolled');
                if (memoBar) memoBar.classList.add('scrolled');
            } else {
                if (todoBar) todoBar.classList.remove('scrolled');
                if (memoBar) memoBar.classList.remove('scrolled');
            }
        });

        // ============ 键盘快捷键 ============
        document.addEventListener('keydown', function(e) {
            // Esc 关闭弹窗
            if (e.key === 'Escape') {
                if (document.getElementById('addTodoModal').classList.contains('show')) closeAddTodo();
                if (document.getElementById('addMemoModal').classList.contains('show')) closeAddMemo();
            }
            // Ctrl+N 新建待办
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                const todoPage = document.getElementById('page-todo');
                if (todoPage.classList.contains('active')) openAddTodo();
                const memoPage = document.getElementById('page-memo');
                if (memoPage.classList.contains('active')) openAddMemo();
            }
            // 1/2/3 切换页面
            if (e.key === '1' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
                switchPage('page-todo', document.querySelector('.nav-item[data-page="page-todo"]'));
            }
            if (e.key === '2' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
                switchPage('page-memo', document.querySelector('.nav-item[data-page="page-memo"]'));
            }
            if (e.key === '3' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
                switchPage('page-profile', document.querySelector('.nav-item[data-page="page-profile"]'));
            }
        });

        // ============ 初始化 ============
        function init() {
            renderTodos();
            renderMemos();
            console.log('📱 Mo App 原型已就绪');
            console.log('  🗂️ 底部导航切换页面');
            console.log('  ✅ 点击待办项或复选框切换完成状态');
            console.log('  ➕ 点击右下角 + 按钮新建');
            console.log('  🏷️ 分类标签筛选');
            console.log('  🎨 我的页面可切换主题');
            console.log('  ⌨️ 快捷键: 1/2/3 切换页面, Esc 关闭弹窗, Ctrl+N 新建');
        }
        init();
    </script>
</body>
</html>
