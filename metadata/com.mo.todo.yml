Name: Mo
Summary: A clean and elegant todo & memo app with Material 3 design
Description: |-
  Mo is a minimalist yet powerful Android todo and memo app built with
  Jetpack Compose and Material 3 design language.

  Features:
  * Todo management with priorities, tags, and due dates
  * Memo notes with rich text editing and color labels
  * Smart reminders with triple-guarantee scheduling
  * 5 Morandi color themes with Material You dynamic colors
  * Full personalization: fonts, corners, list density, themes
  * Local JSON import/export and WebDAV cloud backup
  * Privacy-first: all data stored locally on your device

  Mo focuses on simplicity, elegance, and data privacy. No accounts
  required, no analytics, no tracking. Your data stays on your device.

