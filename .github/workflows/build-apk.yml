name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk Mo-${{ steps.version.outputs.VERSION }}-debug.apk

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename release APK
        run: cp app/build/outputs/apk/release/app-release-unsigned.apk Mo-${{ steps.version.outputs.VERSION }}-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mo ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            Mo-${{ steps.version.outputs.VERSION }}-debug.apk
            Mo-${{ steps.version.outputs.VERSION }}-release.apk
